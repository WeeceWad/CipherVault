name: Android Release

# Tag a version to ship it:
#   git tag v1.0.0 && git push origin v1.0.0
#
# This builds a signed APK and publishes it as a GitHub Release. The app's
# in-app updater reads that release, so the asset name must stay stable:
# https://github.com/WeeceWad/CipherVault/releases/latest/download/CipherVault.apk

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.0.0). No leading v.'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Work out the version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          VERSION="${VERSION#v}"

          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$VERSION' is not MAJOR.MINOR.PATCH. Tag like v1.0.0."
            exit 1
          fi

          # Android requires a monotonically increasing integer. 1.2.3 -> 10203,
          # which keeps ordering correct as long as minor/patch stay under 100.
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          echo "name=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "code=$CODE"      >> "$GITHUB_OUTPUT"
          echo "Building $VERSION (versionCode $CODE)"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: CipherVault-Android
        run: npm ci

      - name: Verify the shared engine layer is in sync
        working-directory: CipherVault-Android
        # A stale core.js means the phone derives keys differently from the
        # desktop and silently cannot open the vault. Fail loudly instead.
        run: |
          node scripts/sync-core.js --check
          node scripts/check-parity.js

      - name: Stamp the web build version
        working-directory: CipherVault-Android
        run: |
          cat > www/js/build.js <<EOF
          // Generated at release time. Only used outside the APK.
          window.CIPHERVAULT_BUILD = { version: '${{ steps.version.outputs.name }}' };
          EOF

      - name: Sync web assets into the native project
        working-directory: CipherVault-Android
        run: npx cap sync android

      - name: Restore the signing keystore
        working-directory: CipherVault-Android/android
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is not set. See README-ANDROID.md for how to create the keystore and add the four secrets."
            exit 1
          fi

          echo "$KEYSTORE_BASE64" | base64 -d > ciphervault.keystore

          cat > keystore.properties <<EOF
          storeFile=ciphervault.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build the signed APK
        working-directory: CipherVault-Android/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -PcvVersionName=${{ steps.version.outputs.name }} \
            -PcvVersionCode=${{ steps.version.outputs.code }}

      - name: Confirm the APK is signed
        working-directory: CipherVault-Android/android
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          test -f "$APK" || { echo "::error::No APK produced"; exit 1; }

          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          "$BUILD_TOOLS/apksigner" verify --print-certs "$APK"

          mkdir -p ../../dist
          cp "$APK" ../../dist/CipherVault.apk

      - name: Clean up signing material
        if: always()
        working-directory: CipherVault-Android/android
        run: rm -f ciphervault.keystore keystore.properties

      - name: Publish the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: CipherVault v${{ steps.version.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/CipherVault.apk
          body: |
            ## CipherVault v${{ steps.version.outputs.name }}

            **Android** — download `CipherVault.apk` below, or let the app update
            itself: Settings → Check for Updates.

            Installing over an existing copy keeps your vault. If Android refuses
            the install, the APK was signed with a different key — uninstall first,
            then sign in again to restore from the cloud.

            <!-- Release notes are appended automatically from the commits. -->

      - name: Upload the APK as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CipherVault-${{ steps.version.outputs.name }}-apk
          path: dist/CipherVault.apk
          retention-days: 30
