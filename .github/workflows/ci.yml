name: CI

# Catches the two failure modes that silently break the vault:
#   1. The generated engine layer drifting from CipherVault/js/app.js, which
#      makes a vault encrypted on one device unopenable on another.
#   2. A syntax error in a plain <script> file, which only shows up at runtime
#      because nothing here goes through a bundler.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Android app dependencies
        working-directory: CipherVault-Android
        run: npm ci

      - name: Generated engine layer is up to date
        working-directory: CipherVault-Android
        run: node scripts/sync-core.js --check

      - name: Syntax-check every script
        run: |
          FAILED=0
          for f in \
            CipherVault/js/app.js \
            CipherVault-Desktop/js/app.js \
            CipherVault-Desktop/main.js \
            CipherVault-Desktop/test/e2e.js \
            CipherVault-Extension/js/popup.js \
            CipherVault-Extension/js/content.js \
            CipherVault-Extension/js/crypto.js \
            CipherVault-Android/www/js/core.js \
            CipherVault-Android/www/js/mobile.js \
            CipherVault-Android/www/js/updater.js \
            CipherVault-Android/scripts/sync-core.js \
            _devserver.js
          do
            if node --check "$f"; then
              echo "  ok    $f"
            else
              echo "::error file=$f::Syntax error"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: Workflows parse
        # A malformed workflow does not fail loudly - GitHub shows the run under
        # the raw filename with zero jobs, which is easy to mistake for "it did
        # not need to run". That once let a broken release workflow through.
        run: |
          npm install --no-save --silent js-yaml
          node -e "
            const yaml = require('js-yaml');
            const fs = require('fs');
            let bad = 0;
            for (const f of fs.readdirSync('.github/workflows')) {
              if (!/\.ya?ml\$/.test(f)) continue;
              try {
                const doc = yaml.load(fs.readFileSync('.github/workflows/' + f, 'utf8'));
                const jobs = Object.keys((doc && doc.jobs) || {});
                if (jobs.length === 0) throw new Error('no jobs defined');
                console.log('  ok    ' + f + '  [' + jobs.join(', ') + ']');
              } catch (e) {
                console.log('::error file=.github/workflows/' + f + '::' + (e.reason || e.message));
                bad++;
              }
            }
            process.exit(bad ? 1 : 0);
          "

      - name: Manifests parse
        run: |
          node -e "JSON.parse(require('fs').readFileSync('CipherVault-Extension/manifest.json','utf8'))" && echo "  ok    extension manifest"
          node -e "JSON.parse(require('fs').readFileSync('CipherVault-Android/capacitor.config.json','utf8'))" && echo "  ok    capacitor config"
          node -e "JSON.parse(require('fs').readFileSync('CipherVault-Desktop/package.json','utf8'))" && echo "  ok    desktop package.json"

      - name: All platforms derive keys identically
        # If the PBKDF2 settings diverge between desktop, extension and phone,
        # a vault encrypted on one device silently stops opening on another.
        working-directory: CipherVault-Android
        run: node scripts/check-parity.js

  android-build:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: CipherVault-Android
        run: npm ci

      - name: Sync web assets
        working-directory: CipherVault-Android
        run: npx cap sync android

      - name: Build debug APK
        working-directory: CipherVault-Android/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
