<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320, initial-scale=1.0">
  <title>CipherVault</title>
  <link rel="stylesheet" href="css/popup.css">
</head>
<body>

  <!-- Header -->
  <header class="ext-header">
    <div class="brand">
      <svg viewBox="0 0 24 24" class="shield-icon"><path fill="currentColor" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-5.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
      <span>CipherVault</span>
    </div>
    <div class="sync-status" id="ext-sync-status">
      <span class="status-label" id="status-label"></span>
      <div class="status-dot" id="status-dot"></div>
    </div>
  </header>

  <!-- View 0: Booting / waiting for Firebase to restore the session -->
  <div id="view-loading" class="view">
    <div class="centered-note">
      <div class="spinner"></div>
      <p>Connecting…</p>
    </div>
  </div>

  <!-- View 1: Sign in to the cloud account -->
  <div id="view-connect" class="view hidden">
    <h3>Sign In</h3>
    <p>Sign in with your CipherVault account to sync your encrypted vault.</p>
    <form id="connect-form">
      <input type="email" id="fb-email" placeholder="Email Address" autocomplete="username" required>
      <input type="password" id="fb-password" placeholder="Account Password" autocomplete="current-password" required>
      <div style="text-align: right;">
        <button type="button" id="btn-ext-forgot-fb" class="btn-link">Forgot account password?</button>
      </div>
      <button type="submit" class="btn-primary" id="btn-connect-submit">Sign In</button>
    </form>
    <div id="fb-error" class="error-msg hidden"></div>
    <div id="fb-success" class="success-msg hidden"></div>
  </div>

  <!-- View 2: This account has no vault yet -->
  <div id="view-no-vault" class="view hidden">
    <h3>No Vault Yet</h3>
    <p>
      <span id="no-vault-account"></span> doesn't have a vault in the cloud yet.
      Create your master password in the CipherVault desktop or web app, then reopen this popup.
    </p>
    <button type="button" class="btn-primary" id="btn-retry-sync">Check Again</button>
    <button type="button" class="btn-secondary" id="btn-no-vault-signout">Sign Out</button>
  </div>

  <!-- View 3: Unlock Vault (Master Password) -->
  <div id="view-unlock" class="view hidden">
    <h3>Unlock Vault</h3>
    <p>Enter the master password for <span id="unlock-account" class="account-chip"></span>.</p>
    <form id="unlock-form">
      <input type="password" id="master-password" placeholder="Master Password" autocomplete="current-password" required autofocus>
      <button type="submit" class="btn-primary" id="btn-unlock-submit">Unlock</button>
    </form>
    <div id="unlock-error" class="error-msg hidden"></div>
    <div class="view-footer-link">
      <button type="button" id="btn-unlock-signout" class="btn-link">Sign out of this account</button>
    </div>
  </div>

  <!-- View 4: Vault List (Decrypted) -->
  <div id="view-vault" class="view hidden">
    <div class="search-container">
      <input type="text" id="search-input" placeholder="Search logins…" autocomplete="off">
    </div>
    <div class="vault-list" id="vault-list">
      <!-- Items injected by popup.js -->
    </div>
    <div class="footer-actions">
      <button id="btn-lock" class="btn-icon" title="Lock Vault">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
      </button>
      <span class="footer-count" id="vault-count"></span>
      <button id="btn-logout" class="btn-icon" title="Sign Out">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
      </button>
    </div>
  </div>

  <!-- Firebase Scripts (Bundled Locally - MV3 forbids remote code) -->
  <script src="lib/firebase-app-compat.js"></script>
  <script src="lib/firebase-auth-compat.js"></script>
  <script src="lib/firebase-firestore-compat.js"></script>

  <!-- App Scripts -->
  <script src="js/crypto.js"></script>
  <script src="js/popup.js"></script>
</body>
</html>
